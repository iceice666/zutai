name: Cloudflare Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Zutai site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Build site
        run: nix develop --command cargo run -q -p zutai-web -- build website/main.zt --out-dir dist

      - name: Store Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: zutai-pages
          path: dist
          if-no-files-found: error
          retention-days: 3

  deploy:
    name: Deploy Pages
    needs: build
    if: >-
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out repository metadata
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Restore Pages artifact
        uses: actions/download-artifact@v4
        with:
          name: zutai-pages
          path: dist

      - name: Verify Pages credentials
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          test -n "$CLOUDFLARE_ACCOUNT_ID" &&
          test -n "$CLOUDFLARE_API_TOKEN"

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "4.90.0"
          command: >-
            pages deploy dist
            --project-name=zutai-lang
            --branch=${{ github.event_name == 'push' && 'main' || format('pr-{0}', github.event.pull_request.number) }}
