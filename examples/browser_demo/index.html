<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zutai Deploy Readiness</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f4;
      --panel: #ffffff;
      --ink: #17211c;
      --muted: #617067;
      --line: #dce4dd;
      --accent: #176b87;
      --ship: #127a59;
      --hold: #b42318;
      --warn: #a96800;
      --shadow: 0 10px 30px rgba(23, 33, 28, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    * {
      box-sizing: border-box;
      letter-spacing: 0;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 4.5rem);
      line-height: 0.95;
      max-width: 760px;
    }

    h2 {
      font-size: 1rem;
      margin-bottom: 14px;
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    button {
      min-width: 112px;
      height: 44px;
      border: 1px solid var(--ink);
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
    }

    button:focus-visible {
      outline: 3px solid rgba(23, 107, 135, 0.32);
      outline-offset: 3px;
    }

    .summary {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) repeat(3, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .metric,
    .panel,
    pre {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .metric {
      min-height: 116px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .metric span {
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .metric strong {
      font-size: clamp(1.6rem, 4vw, 3rem);
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .metric.wide strong {
      font-size: clamp(1.3rem, 3vw, 2.15rem);
    }

    body[data-gate="ship"] .gate strong {
      color: var(--ship);
    }

    body[data-gate="hold"] .gate strong {
      color: var(--hold);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, 0.76fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      padding: 18px;
    }

    dl {
      display: grid;
      grid-template-columns: 140px minmax(0, 1fr);
      gap: 12px 18px;
      margin: 0;
    }

    dt {
      color: var(--muted);
      font-weight: 700;
    }

    dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    ul {
      display: grid;
      gap: 10px;
      min-height: 52px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    li {
      border-left: 4px solid var(--warn);
      padding: 10px 12px;
      background: #fff8ea;
      border-radius: 6px;
      font-weight: 700;
    }

    .rail {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin: 18px 0 0;
    }

    .step {
      min-height: 10px;
      border-radius: 999px;
      background: var(--line);
    }

    .step.active {
      background: var(--accent);
    }

    body[data-gate="hold"] .step.final {
      background: var(--hold);
    }

    body[data-gate="ship"] .step.final {
      background: var(--ship);
    }

    pre {
      min-height: 188px;
      margin: 18px 0 0;
      padding: 16px;
      overflow: auto;
      color: #102019;
      font-size: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    footer {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      margin-top: 16px;
      font-size: 0.88rem;
    }

    code {
      color: var(--accent);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    .error {
      color: var(--hold);
      font-weight: 700;
    }

    @media (max-width: 760px) {
      main {
        width: min(100% - 24px, 560px);
        padding-top: 18px;
      }

      header,
      footer {
        align-items: flex-start;
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .summary,
      .grid,
      dl {
        grid-template-columns: 1fr;
      }

      .metric {
        min-height: 96px;
      }
    }
  </style>
</head>
<body data-gate="">
  <main>
    <header>
      <div>
        <p class="eyebrow">Zutai compiled library</p>
        <h1>Deploy readiness</h1>
      </div>
      <button id="refresh" type="button">Refresh</button>
    </header>

    <section class="summary" aria-label="Deployment summary">
      <div class="metric wide">
        <span>Summary</span>
        <strong id="summary">Loading</strong>
      </div>
      <div class="metric gate">
        <span>Gate</span>
        <strong id="gate">...</strong>
      </div>
      <div class="metric">
        <span>Risk</span>
        <strong id="risk">...</strong>
      </div>
      <div class="metric">
        <span>Rollout</span>
        <strong id="rollout">...</strong>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Deployment</h2>
        <dl>
          <dt>Target</dt>
          <dd id="target">...</dd>
          <dt>Owner</dt>
          <dd id="owner">...</dd>
          <dt>Status</dt>
          <dd id="status">Loading</dd>
        </dl>
        <div class="rail" aria-hidden="true">
          <span class="step active"></span>
          <span class="step active"></span>
          <span class="step final"></span>
        </div>
      </div>

      <div class="panel">
        <h2>Failed checks</h2>
        <ul id="failed"></ul>
      </div>
    </section>

    <pre id="raw">{}</pre>

    <footer>
      <span><code>/api/deploy-readiness</code></span>
      <span id="updated">Waiting for data</span>
    </footer>
  </main>

  <script>
    const endpoint = "/api/deploy-readiness";
    const ids = ["summary", "gate", "risk", "rollout", "target", "owner", "status", "updated", "raw"];
    const el = Object.fromEntries(ids.map((id) => [id, document.getElementById(id)]));
    const failed = document.getElementById("failed");
    const refresh = document.getElementById("refresh");

    function atom(value) {
      return String(value ?? "").replace(/^#/, "");
    }

    function render(data) {
      const gate = atom(data.gate);
      document.body.dataset.gate = gate;
      el.status.classList.remove("error");
      el.summary.textContent = data.summary ?? "Unknown";
      el.gate.textContent = gate || "unknown";
      el.risk.textContent = data.risk ?? 0;
      el.rollout.textContent = `${data.rolloutPercent ?? 0}%`;
      el.target.textContent = data.target ?? "unknown";
      el.owner.textContent = data.owner ?? "unknown";
      el.status.textContent = gate === "ship" ? "Ready to ship" : "Hold release";
      el.raw.textContent = JSON.stringify(data, null, 2);
      el.updated.textContent = `Updated ${new Date().toLocaleTimeString()}`;

      failed.replaceChildren();
      const items = Array.isArray(data.failed) ? data.failed : [];
      if (items.length === 0) {
        const li = document.createElement("li");
        li.textContent = "None";
        failed.append(li);
        return;
      }
      for (const item of items) {
        const li = document.createElement("li");
        li.textContent = item;
        failed.append(li);
      }
    }

    async function load() {
      refresh.disabled = true;
      el.status.classList.remove("error");
      el.status.textContent = "Loading";
      try {
        const response = await fetch(endpoint, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`${response.status} ${response.statusText}`);
        }
        render(await response.json());
      } catch (error) {
        el.status.classList.add("error");
        el.status.textContent = error.message;
        el.updated.textContent = "Request failed";
      } finally {
        refresh.disabled = false;
      }
    }

    refresh.addEventListener("click", load);
    load();
  </script>
</body>
</html>
